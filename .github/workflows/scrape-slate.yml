name: Scrape Slate
on:
  # No schedule — this scraper must run locally (Slate blocks datacenter IPs)
  # Use workflow_dispatch to commit+push after running locally
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ github.token }}
          ref: main
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install -r aviato-app/scrapers/requirements.txt
      - name: Update flights.ts from existing slate_flights.json
        run: cd aviato-app/scrapers && python update_flights.py
      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add aviato-app/app/data/flights.ts aviato-app/scrapers/slate_flights.json
          if ! git diff --cached --quiet; then
            git commit -m "Auto-update Slate flight data $(date -u +%Y-%m-%d)"
            git pull --rebase origin main
            git push
          else
            echo "No Slate flight data changes to commit"
          fi
